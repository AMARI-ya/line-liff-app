<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出費の申請 | プロ仕様</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
    <div class="bg-gradient-to-r" style="background-image: linear-gradient(135deg, #06b6d4 0%, #0db66f 100%);">
      <div class="p-6 text-center">
        <h2 class="text-xl font-bold text-white tracking-wide">💸 出費の精算申請</h2>
        <p class="text-xs text-cyan-100 mt-1">企業クオリティのスマート精算システム</p>
      </div>
    </div>
    
    <form id="expenseForm" class="p-6 space-y-5">
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">イベント名 / フラグ</label>
        <input type="text" id="eventName" placeholder="例: BBQ_2026/07/17" class="w-full rounded-xl border border-slate-200 p-3 text-sm bg-slate-50 focus:bg-white focus:ring-2 focus:ring-cyan-500 focus:border-transparent outline-none transition" required>
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">支払った金額 (円)</label>
        <div class="relative">
          <span class="absolute left-3 top-3 text-slate-400 text-sm font-bold">¥</span>
          <input type="number" id="amount" placeholder="金額を入力" class="w-full rounded-xl border border-slate-200 p-3 pl-8 text-sm bg-slate-50 focus:bg-white focus:ring-2 focus:ring-cyan-500 focus:border-transparent outline-none transition" required>
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">請求期日</label>
        <input type="date" id="dueDate" class="w-full rounded-xl border border-slate-200 p-3 text-sm bg-slate-50 focus:bg-white focus:ring-2 focus:ring-cyan-500 focus:border-transparent outline-none transition" required>
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">割り振りメンバー（カンマ区切り）</label>
        <input type="text" id="members" placeholder="例: 太郎, 次郎, 花子" class="w-full rounded-xl border border-slate-200 p-3 text-sm bg-slate-50 focus:bg-white focus:ring-2 focus:ring-cyan-500 focus:border-transparent outline-none transition" required>
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">希望する受け取り決済（複数選択可）</label>
        <div class="grid grid-cols-2 gap-2">
          <label class="border border-slate-200 rounded-xl p-3 flex items-center space-x-2 cursor-pointer hover:bg-slate-50 transition select-none has-[:checked]:border-red-500 has-[:checked]:bg-red-50">
            <input type="checkbox" name="paymethod" value="PayPay" class="rounded text-red-500 focus:ring-red-500">
            <span class="text-sm font-bold text-slate-700">🔴 PayPay</span>
          </label>
          <label class="border border-slate-200 rounded-xl p-3 flex items-center space-x-2 cursor-pointer hover:bg-slate-50 transition select-none has-[:checked]:border-emerald-500 has-[:checked]:bg-emerald-50">
            <input type="checkbox" name="paymethod" value="ことら送金" class="rounded text-emerald-500 focus:ring-emerald-500">
            <span class="text-sm font-bold text-slate-700">🟢 ことら送金</span>
          </label>
          <label class="border border-slate-200 rounded-xl p-3 flex items-center space-x-2 cursor-pointer hover:bg-slate-50 transition select-none has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
            <input type="checkbox" name="paymethod" value="銀行振込" class="rounded text-blue-500 focus:ring-blue-500">
            <span class="text-sm font-bold text-slate-700">🔵 銀行振込</span>
          </label>
          <label class="border border-slate-200 rounded-xl p-3 flex items-center space-x-2 cursor-pointer hover:bg-slate-50 transition select-none has-[:checked]:border-amber-500 has-[:checked]:bg-amber-50">
            <input type="checkbox" name="paymethod" value="現金" class="rounded text-amber-500 focus:ring-amber-500">
            <span class="text-sm font-bold text-slate-700">🪙 現金手渡し</span>
          </label>
        </div>
      </div>

      <div class="pt-2">
        <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-cyan-500 to-emerald-500 hover:from-cyan-600 hover:to-emerald-600 text-white font-bold py-3 px-4 rounded-xl shadow-md transform active:scale-[0.98] transition duration-150">
          🚀 申請を送信する
        </button>
      </div>
    </form>
  </div>

  <script>
    // ※あなたのLIFF IDをそのまま引き継いでいます
    const LIFF_ID = "2010226382-7KYbDoOC"; 

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); }
      } catch (error) { console.error("LIFF初期化失敗", error); }
    }

    window.onload = function() { initLiff(); };

    document.getElementById('expenseForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerText = "送信中...";

      const eventName = document.getElementById('eventName').value;
      const amount = document.getElementById('amount').value;
      const dueDate = document.getElementById('dueDate').value;
      const members = document.getElementById('members').value;

      // 選択された決済方法を回収する処理
      const checkedBoxes = document.querySelectorAll('input[name="paymethod"]:checked');
      const methods = Array.from(checkedBoxes).map(cb => cb.value);
      const methodsText = methods.length > 0 ? methods.join(', ') : '指定なし';

      const formattedDate = dueDate.replace(/-/g, '/');

      // メッセージに決済方法も自動で追加されるように進化！
      const messageText = `【精算申請】\nイベント: ${eventName}\n金額: ${amount}円\n期日: ${formattedDate}\nメンバー: ${members}\n受取方法: ${methodsText}`;

      try {
        // スマホのトーク内ならそのまま送信
        await liff.sendMessages([{
          type: 'text',
          text: messageText
        }]);
        liff.closeWindow();
      } catch (error) {
        // PCブラウザや外部ブラウザで送れなかったときのエラーメッセージをスマートに
        alert("【確認】PCブラウザ、またはトーク外から開かれているためLINEへの自動投稿をスキップしました（画面の引っ越しは成功しています！）。データをスプレッドシートへ直接送る「裏方API連携」へ進みましょう！");
        submitBtn.disabled = false;
        submitBtn.innerText = "🚀 申請を送信する";
      }
    });
  </script>
</body>
</html>
