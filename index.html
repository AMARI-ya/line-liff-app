<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>自動割り勘精算</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f9; margin: 0; padding: 0; color: #333; min-height: 100vh; box-sizing: border-box; }
    .card { background: white; padding: 20px; box-sizing: border-box; width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
    h2 { margin-top: 0; font-size: 19px; color: #111; border-left: 5px solid #06C755; padding-left: 10px; margin-bottom: 20px; }
    h3 { font-size: 14px; color: #555; margin: 15px 0 8px 0; font-weight: bold; }
    .form-group { margin-bottom: 16px; width: 100%; box-sizing: border-box; }
    label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 13px; color: #444; }
    
    input[type="text"], input[type="number"], input[type="datetime-local"], select {
      width: 100%; height: 46px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: #fafafa; max-width: 100%; min-width: 0; }
    
    .radio-group { display: flex; gap: 10px; margin-bottom: 16px; width: 100%; box-sizing: border-box; }
    .radio-label { display: flex; align-items: center; gap: 6px; background: #f0f0f0; padding: 12px; border-radius: 8px; cursor: pointer; flex: 1; justify-content: center; font-weight: bold; font-size: 14px; color: #555; }
    input[type="radio"]:checked + .radio-label { background: #06C755; color: white; }
    input[type="radio"] { display: none; }
    
    .btn-submit { background-color: #06C755; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 12px rgba(6,199,85,0.2); box-sizing: border-box; }
    .btn-decline { background-color: #888; color: white; border: none; width: 100%; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; box-sizing: border-box; }
    .btn-back { background: none; border: 1px solid #ccc; color: #666; padding: 8px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-bottom: 15px; align-self: flex-start; }

    .event-list-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
    .event-item-card { background: #f8f9fa; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px; font-size: 13px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.02); cursor: pointer; transition: background 0.2s; }
    .event-item-card:active { background: #edf2f7; }
    .event-item-title { font-weight: bold; font-size: 15px; color: #111; margin-bottom: 4px; padding-right: 90px; }
    .event-item-meta { color: #718096; font-size: 12px; margin-bottom: 2px; }
    .event-item-price { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-weight: bold; font-size: 15px; text-align: right; line-height: 1.2; }
    .badge-status { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; color: white; margin-left: 6px; }

    .success-container { text-align: center; padding: 30px 20px; background: white; min-height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .success-icon { font-size: 44px; color: #06C755; margin-bottom: 12px; }
    .success-title { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
    .success-text { font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.5; }
    
    .info-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: #f8f9fa; border-radius: 8px; overflow: hidden; font-size: 13px; }
    .info-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
    .info-table td.label-td { font-weight: bold; color: #555; width: 35%; }
    
    .calc-box { width: 100%; background: #fff3cd; border: 1px solid #ffeeba; padding: 14px; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; text-align: left; }
    .calc-price { font-size: 22px; font-weight: bold; color: #df382c; }
    .btn-calendar-trigger { background-color: #4285F4; color: white; border: none; width: 100%; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; box-sizing: border-box; }
    .no-data { text-align: center; color: #a0aec0; font-size: 13px; padding: 20px; background: #fafafa; border-radius: 8px; border: 1px dashed #cbd5e0; }

    /* モーダル基本 */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 15px; box-sizing: border-box; }
    .modal-box { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 340px; text-align: center; box-sizing: border-box; max-height: 90vh; overflow-y: auto; }
    .modal-btn { display: block; width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 6px; border: none; font-size: 14px; font-weight: bold; cursor: pointer; text-decoration: none; box-sizing: border-box; }
    
    /* 詳細ダイアログ固有 */
    .detail-section { text-align: left; margin-bottom: 15px; font-size: 13px; border-bottom: 1px solid #eee; padding-bottom: 12px; }
    .detail-section:last-child { border-bottom: none; }
    .detail-title { font-weight: bold; color: #111; margin-bottom: 6px; font-size: 14px; display: flex; justify-content: space-between; }
    .exp-row { display: flex; justify-content: space-between; padding: 4px 0; color: #4a5568; }

    .skeleton-screen { padding: 20px; background: white; min-height: 100vh; box-sizing: border-box; }
    .skeleton-line { height: 18px; background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; margin-bottom: 12px; border-radius: 4px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="skeleton" class="skeleton-screen">
  <div class="skeleton-line" style="width: 50%; height: 24px; margin-bottom: 20px;"></div>
  <div class="skeleton-line" style="width: 100%; height: 45px; margin-bottom: 15px;"></div>
  <div class="skeleton-line" style="width: 100%; height: 45px;"></div>
</div>

<div id="mypage_screen" class="card hidden">
  <h2>📊 精算マイページ</h2>
  <div style="font-size:14px; margin-bottom:15px; color:#4a5568;">ユーザー: <span id="mypage_user_name" style="font-weight:bold; color:#1a202c;">-</span></div>
  
  <button class="btn-submit" style="margin-bottom:20px; background-color:#007aff; box-shadow: 0 4px 12px rgba(0,122,255,0.2);" onclick="showInputForm()">➕ 新しく出費を精算申請する</button>

  <h3>👑 あなたが管理・主催（回収中）</h3>
  <div id="hosting_list" class="event-list-container"></div>

  <h3>👥 あなたが参加中（精算待ち）</h3>
  <div id="joining_list" class="event-list-container"></div>
</div>

<div id="app" class="card hidden">
  <button class="btn-back" onclick="backToMyPage()">🔙 マイページに戻る</button>
  <h2>出費の精算申請</h2>
  
  <div class="radio-group">
    <input type="radio" id="type_new" name="event_type" value="新規" checked onchange="toggleEventMode()">
    <label for="type_new" class="radio-label">🆕 新規イベント</label>
    <input type="radio" id="type_exist" name="event_type" value="既存" onchange="toggleEventMode()">
    <label for="type_exist" class="radio-label">📂 既存に追加</label>
  </div>

  <div id="group_new_event" class="form-group">
    <label for="event_name">イベント名 / グループ名</label>
    <input type="text" id="event_name" placeholder="例: 夏合宿2026, 週末BBQ">
  </div>

  <div id="group_exist_event" class="form-group hidden">
    <label for="select_event">既存の精算イベントを選択</label>
    <select id="select_event"></select>
  </div>

  <div class="form-group">
    <label for="amount">今回の支払額 (円)</label>
    <input type="number" id="amount" inputmode="numeric" placeholder="金額を数字で入力">
  </div>

  <div class="form-group">
    <label for="request_start">請求受付開始日</label>
    <input type="datetime-local" id="request_start">
  </div>

  <div class="form-group">
    <label for="deadline">請求の締め切り期日</label>
    <input type="datetime-local" id="deadline">
  </div>

  <button class="btn-submit" onclick="submitForm()">🚀 メンバーを選んで申請・追加する</button>
</div>

<div id="success_page" class="success-container hidden">
  <div class="success-icon">✓</div>
  <div class="success-title">申請・追加が完了！</div>
  <div class="success-text">LINEメンバーにメッセージを送信しました。</div>
  <table class="info-table">
    <tr><td class="label-td">イベント</td><td id="res_event">-</td></tr>
    <tr><td class="label-td">登録金額</td><td id="res_amount">-</td></tr>
  </table>
  <button class="btn-calendar-trigger" style="margin-bottom:10px;" onclick="openCalendarModal()">📅 カレンダーに期日を追加</button>
  <button class="btn-submit" style="background-color:#007aff;" onclick="backToMyPageFromDone()">📊 マイページへ戻る</button>
</div>

<div id="member_join_page" class="card hidden">
  <h2>精算イベントへの招待</h2>
  <div class="success-text" style="text-align: left; margin-bottom: 15px;">
    <span id="join_creator" style="font-weight: bold; color: #111;">-</span> さんからグループ精算の招待が届いています。
  </div>
  <table class="info-table" style="margin-bottom: 15px;">
    <tr><td class="label-td">イベント名</td><td id="join_event_name">-</td></tr>
    <tr><td class="label-td">現在の総額</td><td id="join_amount">-</td></tr>
    <tr><td class="label-td">精算締切</td><td id="join_deadline">-</td></tr>
  </table>
  <button class="btn-submit" onclick="processMemberResponse('join')">⭕ 参加する（グループに加わる）</button>
  <button class="btn-decline" onclick="processMemberResponse('decline')">❌ 今回はいいえ（閉じる）</button>
</div>

<div id="member_success_page" class="success-container hidden">
  <div class="success-icon" style="color: #007aff;">✓</div>
  <div class="success-title">参加を確定しました！</div>
  <div class="success-text">精算メンバーの割り勘分母に追加されました。</div>
  <button class="btn-calendar-trigger" style="margin-bottom:10px;" onclick="openCalendarModal()">📅 カレンダーに期日を追加</button>
  <button class="btn-submit" style="background-color:#007aff;" onclick="backToMyPageFromDone()">📊 マイページへ戻る</button>
</div>

<div id="detail_modal" class="modal-overlay hidden">
  <div class="modal-box">
    <h3 style="margin-top:0; font-size:16px; border-bottom:2px solid #06C755; padding-bottom:6px;" id="md_event_name">-</h3>
    
    <div class="detail-section">
      <div class="detail-title">💰 精算計算（あなたの状況）</div>
      <div id="md_calc_detail" style="line-height: 1.6; font-size:13px; color:#2d3748;">-</div>
    </div>

    <div class="detail-section">
      <div class="detail-title">📂 出費明細一覧</div>
      <div id="md_expenses_list" style="max-height:100px; overflow-y:auto;"></div>
    </div>

    <div class="detail-section">
      <div class="detail-title">👥 参加メンバー</div>
      <div id="md_members_list" style="color:#4a5568;">-</div>
    </div>

    <div id="md_admin_controls" class="hidden" style="background:#fff5f5; padding:10px; border-radius:8px; margin-bottom:12px;">
      <div style="font-weight:bold; font-size:11px; color:#c53030; margin-bottom:6px;">👑 主催者管理メニュー</div>
      <button class="modal-btn" style="background:#e53e3e; color:white; padding:8px; font-size:12px;" onclick="clickUpdateStatus('削除')">🚨 この精算を取り下げる(削除)</button>
      <button class="modal-btn" style="background:#319795; color:white; padding:8px; font-size:12px;" onclick="clickUpdateStatus('完了')">✓ 精算を完了(済)にする</button>
    </div>

    <button class="modal-btn" style="background:#007aff; color:white;" onclick="clickQuickAddExpense()">➕ このイベントに出費を追加</button>
    <button class="modal-btn" style="background:#eee; color:#333;" onclick="closeDetailModal()">閉じる</button>
  </div>
</div>

<div id="calendar_modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div style="font-size:15px; font-weight:bold; margin-bottom:12px;">お使いのカレンダーを選択</div>
    <a id="modal_gcal" href="#" target="_blank" class="modal-btn" style="background:#de4b39; color:white;" onclick="closeCalendarModal()">Google カレンダー</a>
    <button class="modal-btn" style="background:#111; color:white;" onclick="openIphoneCalendar()">iPhone / 標準カレンダー</button>
    <button class="modal-btn" style="background:#eee; color:#444;" onclick="closeCalendarModal()">キャンセル</button>
  </div>
</div>

<script>
  const LIFF_ID = "2010226382-7KYbDoOC"; 
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz3NF7dnj_aC1Js7ZuYMT66OEPCVPfTzM68-2b-eB4DBI_s0CV5TnmNw3ndukzG_nHr/exec"; 

  let currentUserName = "ゲスト";
  let gEventData = {}; 
  let paramTxId = null;
  let paramAction = null;
  let selectedTxIdForModal = null;

  window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    paramAction = urlParams.get('action');
    paramTxId = urlParams.get('txId');

    liff.init({ liffId: LIFF_ID }).then(() => {
      if (!liff.isLoggedIn()) { liff.login(); } else { routeScreen(); }
    }).catch(err => console.error(err));
  };

  function routeScreen() {
    liff.getProfile().then(prof => { 
      currentUserName = prof.displayName;
      if (paramAction === 'join' && paramTxId) { loadMemberJoinPage(paramTxId); } else { loadMyPage(); }
    }).catch(() => {
      if (paramAction === 'join' && paramTxId) { loadMemberJoinPage(paramTxId); } else { loadMyPage(); }
    });
  }

  // 📊 【マイページ読み込み】
  function loadMyPage() {
    document.getElementById("mypage_user_name").innerText = currentUserName;
    fetch(`${GAS_WEB_APP_URL}?action=getMyEvents&userName=${encodeURIComponent(currentUserName)}`)
      .then(res => res.json())
      .then(data => {
        if (data.status === 'success') {
          const hList = document.getElementById("hosting_list");
          const jList = document.getElementById("joining_list");
          const select = document.getElementById("select_event");
          hList.innerHTML = ""; jList.innerHTML = "";
          select.innerHTML = '<option value="">-- 既存イベントを選択 --</option>';

          // 主催リスト
          if(data.hosting.length === 0) hList.innerHTML = '<div class="no-data">主催している未精算イベントはありません。</div>';
          else {
            data.hosting.forEach(ev => {
              const badgeColor = ev.status === '完了' ? '#888' : '#06C755';
              const priceText = ev.balance >= 0 ? `ともらう<br><span style="color:#06C755; font-size:16px;">+${ev.balance.toLocaleString()}円</span>` : `と支払う<br><span style="color:#df382c; font-size:16px;">${ev.balance.toLocaleString()}円</span>`;
              hList.innerHTML += `<div class="event-item-card" onclick="openDetailModal('${ev.txId}')"><div class="event-item-title">👑 ${ev.eventName}<span class="badge-status" style="background:${badgeColor}">${ev.status}</span></div><div class="event-item-meta">総額: ${ev.totalAmount.toLocaleString()}円 (計${ev.memberCount}人)</div><div class="event-item-meta">締切: ${formatDateTime(ev.deadline)}</div><div class="event-item-price"><span style="font-size:9px; color:#718096; font-weight:normal;">あなたがあ</span><br>${priceText}</div></div>`;
              if(ev.status !== '完了') select.innerHTML += `<option value="${ev.txId}">${ev.eventName}</option>`;
            });
          }

          // 参加リスト
          if(data.joining.length === 0) jList.innerHTML = '<div class="no-data">参加している精算イベントはありません。</div>';
          else {
            data.joining.forEach(ev => {
              const badgeColor = ev.status === '完了' ? '#888' : '#4285F4';
              const priceText = ev.balance >= 0 ? `ともらう<br><span style="color:#06C755; font-size:16px;">+${ev.balance.toLocaleString()}円</span>` : `と支払う<br><span style="color:#df382c; font-size:16px;">${ev.balance.toLocaleString()}円</span>`;
              jList.innerHTML += `<div class="event-item-card" onclick="openDetailModal('${ev.txId}')"><div class="event-item-title">👥 ${ev.eventName}<span class="badge-status" style="background:${badgeColor}">${ev.status}</span></div><div class="event-item-meta">主催: ${ev.creator} / 総額: ${ev.totalAmount.toLocaleString()}円</div><div class="event-item-meta">締切: ${formatDateTime(ev.deadline)}</div><div class="event-item-price"><span style="font-size:9px; color:#718096; font-weight:normal;">あなたがあ</span><br>${priceText}</div></div>`;
              if(ev.status !== '完了') select.innerHTML += `<option value="${ev.txId}">${ev.eventName}</option>`;
            });
          }

          document.getElementById("skeleton").classList.add("hidden");
          document.getElementById("mypage_screen").classList.remove("hidden");
        }
      }).catch(() => alert("同期エラーが発生しました"));
  }

  // 🔍 【詳細ポップアップ起動】
  function openDetailModal(txId) {
    selectedTxIdForModal = txId;
    fetch(`${GAS_WEB_APP_URL}?action=getEventDetails&txId=${txId}`)
      .then(res => res.json())
      .then(res => {
        if(res.status === 'success') {
          const ev = res.event;
          document.getElementById("md_event_name").innerText = ev.eventName;
          document.getElementById("md_members_list").innerText = ev.members.join(", ");
          
          // 明細リストの構築
          const expList = document.getElementById("md_expenses_list");
          expList.innerHTML = "";
          let myPaid = 0;
          ev.expenses.forEach(x => {
            expList.innerHTML += `<div class="exp-row"><span>・${x.name} (${x.payer})</span><span>${x.amount.toLocaleString()}円</span></div>`;
            if(x.payer === currentUserName) myPaid += x.amount;
          });

          // 計算ロジックテキストの可視化
          const count = ev.members.length;
          const perPerson = Math.round(ev.totalAmount / count);
          const bal = myPaid - perPerson;
          let calcHtml = `・イベント総出費: <b>${ev.totalAmount.toLocaleString()}円</b><br>・割り勘人数: <b>${count}人</b> (1人あたり ${perPerson.toLocaleString()}円)<br>・あなたの支払実績: <b>${myPaid.toLocaleString()}円</b><br>`;
          if(bal >= 0) {
            calcHtml += `➔ 差引結果: <b style="color:#06C755; font-size:14px;">+${bal.toLocaleString()}円 もらう権利があります。</b>`;
          } else {
            calcHtml += `➔ 差引結果: <b style="color:#df382c; font-size:14px;">${bal.toLocaleString()}円 支払う必要があります。</b>`;
          }
          document.getElementById("md_calc_detail").innerHTML = calcHtml;

          // 管理者メニュー制御
          if(ev.creator === currentUserName && ev.status !== '完了') {
            document.getElementById("md_admin_controls").classList.remove("hidden");
          } else {
            document.getElementById("md_admin_controls").classList.add("hidden");
          }

          gEventData = { title: `【精算期日】${ev.eventName}`, startRaw: ev.deadline };
          document.getElementById("detail_modal").classList.remove("hidden");
        }
      });
  }

  function closeDetailModal() { document.getElementById("detail_modal").classList.add("hidden"); }

  // 👑 主催者機能：ステータス変更（完了・削除）
  function clickUpdateStatus(targetStatus) {
    if(!confirm(`この精算を「${targetStatus}」に更新してもよろしいですか？`)) return;
    closeDetailModal();
    document.getElementById("mypage_screen").classList.add("hidden");
    document.getElementById("skeleton").classList.remove("hidden");

    const formData = new URLSearchParams();
    formData.append("action", "updateStatus");
    formData.append("txId", selectedTxIdForModal);
    formData.append("status", targetStatus);

    fetch(GAS_WEB_APP_URL, { method: "POST", body: formData.toString() }).then(() => { loadMyPage(); });
  }

  // 🤝 既存イベントへのサクッと出費追加機能
  function clickQuickAddExpense() {
    const item = prompt("何を買いましたか？ (例: 飲み物代、ガソリン代)");
    if(!item) return;
    const price = prompt("いくら払いましたか？ (数字のみ)");
    if(!price || isNaN(price)) return;

    closeDetailModal();
    document.getElementById("mypage_screen").classList.add("hidden");
    document.getElementById("skeleton").classList.remove("hidden");

    const formData = new URLSearchParams();
    formData.append("action", "addExpense");
    formData.append("txId", selectedTxIdForModal);
    formData.append("expenseName", item);
    formData.append("amount", price);
    formData.append("creator", currentUserName);

    fetch(GAS_WEB_APP_URL, { method: "POST", body: formData.toString() }).then(() => { loadMyPage(); });
  }

  // メンバー：招待ページ
  function loadMemberJoinPage(txId) {
    fetch(`${GAS_WEB_APP_URL}?action=getEventDetails&txId=${txId}`)
      .then(res => res.json())
      .then(res => {
        if (res.status === 'success') {
          const ev = res.event;
          document.getElementById("join_creator").innerText = ev.creator;
          document.getElementById("join_event_name").innerText = ev.eventName;
          document.getElementById("join_amount").innerText = ev.totalAmount.toLocaleString() + "円";
          document.getElementById("join_deadline").innerText = formatDateTime(ev.deadline);
          gEventData = { title: `【精算期日】${ev.eventName}`, startRaw: ev.deadline };

          document.getElementById("skeleton").classList.add("hidden");
          document.getElementById("member_join_page").classList.remove("hidden");
        } else { alert("終了したか、存在しない精算イベントです。"); liff.closeWindow(); }
      });
  }

  // 🚀 【フォーム送信】新規または既存への追加
  function submitForm() {
    const mode = document.querySelector('input[name="event_type"]:checked').value;
    const amount = document.getElementById("amount").value;
    const reqStartRaw = document.getElementById("request_start").value;
    const deadlineRaw = document.getElementById("deadline").value;

    if (!amount || !reqStartRaw || !deadlineRaw) { alert("未入力の項目があります。"); return; }

    document.getElementById("app").classList.add("hidden");
    document.getElementById("skeleton").classList.remove("hidden");

    const formData = new URLSearchParams();
    
    if (mode === "新規") {
      const eventName = document.getElementById("event_name").value.trim();
      if (!eventName) { alert("イベント名を入力してください。"); document.getElementById("skeleton").classList.add("hidden"); document.getElementById("app").classList.remove("hidden"); return; }
      const generatedTxId = "TX" + Date.now();

      formData.append("action", "createNewEvent");
      formData.append("txId", generatedTxId);
      formData.append("eventName", eventName);
      formData.append("amount", amount);
      formData.append("requestStart", reqStartRaw);
      formData.append("deadline", deadlineRaw);
      formData.append("creator", currentUserName);

      fetch(GAS_WEB_APP_URL, { method: "POST", body: formData.toString() }).then(r => r.json()).then(res => {
        liff.shareTargetPicker([{
          type: "flex", altText: `【招待】${eventName}の精算グループ`,
          contents: {
            type: "bubble",
            body: {
              type: "box", layout: "vertical",
              contents: [
                { type: "text", text: "📢 精算グループへの招待", weight: "bold", size: "lg", color: "#06C755" },
                { type: "text", text: `イベント: ${eventName}`, size: "md", margin: "md", weight: "bold" },
                { type: "text", text: "この精算グループに参加しますか？", size: "sm", margin: "sm", wrap: true }
              ]
            },
            footer: {
              type: "box", layout: "horizontal", spacing: "sm",
              contents: [{ type: "button", style: "primary", color: "#06C755", action: { type: "uri", label: "⭕ 参加する", uri: `https://liff.line.me/${LIFF_ID}?action=join&txId=${generatedTxId}` } }]
            }
          }
        }]).then(() => {
          showSuccessPage(eventName, amount, reqStartRaw, deadlineRaw);
        }).catch(() => { backToMyPageFromDone(); });
      });

    } else {
      // 📂 既存イベントへの追加ケース
      const selectEl = document.getElementById("select_event");
      const targetTxId = selectEl.value;
      const eventName = selectEl.options[selectEl.selectedIndex].text;
      if (!targetTxId) { alert("イベントを選択してください。"); return; }

      formData.append("action", "addExpense");
      formData.append("txId", targetTxId);
      formData.append("expenseName", prompt("今回追加する出費の品目名を入力してください") || "追加出費分");
      formData.append("amount", amount);
      formData.append("creator", currentUserName);

      fetch(GAS_WEB_APP_URL, { method: "POST", body: formData.toString() }).then(() => {
        showSuccessPage(eventName, amount, reqStartRaw, deadlineRaw);
      });
    }
  }

  function showSuccessPage(name, amt, start, dead) {
    document.getElementById("res_event").innerText = name;
    document.getElementById("res_amount").innerText = Number(amt).toLocaleString() + "円";
    gEventData = { title: `【精算期日】${name}`, startRaw: dead };
    document.getElementById("modal_gcal").href = generateGoogleCalendarUrl(gEventData.title, dead);
    document.getElementById("skeleton").classList.add("hidden");
    document.getElementById("success_page").classList.remove("hidden");
  }

  function processMemberResponse(type) {
    if (type === 'decline') { liff.closeWindow(); return; }
    document.getElementById("member_join_page").classList.add("hidden");
    document.getElementById("skeleton").classList.remove("hidden");

    const formData = new URLSearchParams();
    formData.append("action", "joinEvent");
    formData.append("txId", paramTxId);
    formData.append("userName", currentUserName);

    fetch(GAS_WEB_APP_URL, { method: "POST", body: formData.toString() }).then(() => {
      document.getElementById("modal_gcal").href = generateGoogleCalendarUrl(gEventData.title, gEventData.startRaw);
      document.getElementById("skeleton").classList.add("hidden");
      document.getElementById("member_success_page").classList.remove("hidden");
    });
  }

  // 🌟 【ループ回避】完了後にパラメータを消し飛ばしてマイページに安全に戻る関数
  function backToMyPageFromDone() {
    document.getElementById("success_page").classList.add("hidden");
    document.getElementById("member_success_page").classList.add("hidden");
    document.getElementById("skeleton").classList.remove("hidden");
    
    // URLのパラメータ(?action=...)をブラウザの履歴から消去
    const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
    window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
    
    loadMyPage();
  }

  function openIphoneCalendar() {
    const url = `${GAS_WEB_APP_URL}?action=icsPage&title=${encodeURIComponent(gEventData.title)}&date=${encodeURIComponent(gEventData.startRaw)}`;
    liff.openWindow({ url: url, external: true });
    closeCalendarModal();
  }

  function generateGoogleCalendarUrl(title, startRaw) {
    if(!startRaw) return "#";
    const digits = startRaw.replace(/[^0-9]/g, '');
    const cleanStart = digits.substring(0,8) + "T" + digits.substring(8,12) + "00";
    return `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${cleanStart}/${cleanStart}&details=LINEアプリから対応をお願いします。`;
  }

  function formatDateTime(val) {
    if (!val) return "";
    const d = new Date(val);
    if (isNaN(d.getTime())) return val;
    return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function showInputForm() { document.getElementById("mypage_screen").classList.add("hidden"); document.getElementById("app").classList.remove("hidden"); }
  function backToMyPage() { document.getElementById("app").classList.add("hidden"); loadMyPage(); }
  function toggleEventMode() { const isNew = document.getElementById("type_new").checked; document.getElementById("group_new_event").classList.toggle("hidden", !isNew); document.getElementById("group_exist_event").classList.toggle("hidden", isNew); }
  function openCalendarModal() { document.getElementById("calendar_modal").classList.remove("hidden"); }
  function closeCalendarModal() { document.getElementById("calendar_modal").classList.add("hidden"); }
</script>
</body>
</html>
