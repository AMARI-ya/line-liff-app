<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出費の精算申請</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f9; margin: 0; padding: 0; color: #333; min-height: 100vh; display: flex; flex-direction: column; }
    .card { background: white; padding: 24px 20px; box-sizing: border-box; flex: 1; display: flex; flex-direction: column; justify-content: flex-start; }
    h2 { margin-top: 0; font-size: 19px; color: #111; border-left: 5px solid #06C755; padding-left: 10px; margin-bottom: 24px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #444; }
    
    input[type="text"], input[type="number"], input[type="datetime-local"], select {
      width: 100%; height: 48px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: #fafafa; transition: border 0.2s; -webkit-appearance: none;
    }
    input:focus, select:focus { border-color: #06C755; outline: none; background-color: #fff; }
    
    .radio-group { display: flex; gap: 10px; margin-bottom: 20px; }
    .radio-label { display: flex; align-items: center; gap: 6px; background: #f0f0f0; padding: 12px; border-radius: 8px; cursor: pointer; flex: 1; justify-content: center; font-weight: bold; font-size: 14px; color: #555; }
    input[type="radio"]:checked + .radio-label { background: #06C755; color: white; }
    input[type="radio"] { display: none; }
    
    .btn-submit { background-color: #06C755; color: white; border: none; width: 100%; padding: 16px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 12px rgba(6,199,85,0.2); }
    
    .bank-box { margin-top: 10px; padding: 14px; background: #eef3fc; border-radius: 8px; border-left: 4px solid #007aff; }
    .bank-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .bank-row input, .bank-row select { height: 40px; padding: 8px; font-size: 14px; background: #fff; }

    /* 🌟 申請完了画面 */
    .success-container { text-align: center; padding: 40px 20px; background: white; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .success-icon { font-size: 48px; color: #06C755; margin-bottom: 16px; }
    .success-title { font-size: 22px; font-weight: bold; margin-bottom: 8px; color: #111; }
    .success-text { font-size: 14px; color: #666; margin-bottom: 30px; line-height: 1.6; }
    .info-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background: #f8f9fa; border-radius: 8px; overflow: hidden; font-size: 14px; }
    .info-table td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    .info-table td.label-td { font-weight: bold; color: #555; width: 35%; }
    
    .btn-calendar-trigger { background-color: #4285F4; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 3px 6px rgba(66,133,244,0.2); }

    /* 🌟 カレンダー選択ポップアップ（モーダル窓） */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-box { background: white; padding: 24px; border-radius: 12px; width: 85%; max-width: 320px; text-align: center; }
    .modal-title { font-size: 16px; font-weight: bold; margin-bottom: 16px; color: #111; }
    .modal-btn { display: block; width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: none; font-size: 14px; font-weight: bold; cursor: pointer; text-decoration: none; box-sizing: border-box; }
    .btn-google { background: #de4b39; color: white; }
    .btn-apple { background: #111; color: white; }
    .btn-close { background: #eee; color: #444; margin-bottom: 0; margin-top: 10px; }

    /* スケルトンローディング */
    .skeleton-screen { padding: 20px; background: white; min-height: 100vh; box-sizing: border-box; }
    .skeleton-line { height: 18px; background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; margin-bottom: 12px; border-radius: 4px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="skeleton" class="skeleton-screen">
  <div class="skeleton-line" style="width: 60%; height: 26px; margin-bottom: 25px;"></div>
  <div class="skeleton-line" style="width: 100%; height: 48px; border-radius: 8px; margin-bottom: 20px;"></div>
  <div class="skeleton-line" style="width: 100%; height: 48px; border-radius: 8px;"></div>
</div>

<div id="app" class="card hidden">
  <h2>出費の精算申請</h2>
  
  <div class="radio-group">
    <input type="radio" id="type_new" name="event_type" value="新規" checked onchange="toggleEventMode()">
    <label for="type_new" class="radio-label">🆕 新規イベント</label>
    <input type="radio" id="type_exist" name="event_type" value="既存" onchange="toggleEventMode()">
    <label for="type_exist" class="radio-label">📂 既存に追加</label>
  </div>

  <div id="group_new_event" class="form-group">
    <label for="event_name">イベント名</label>
    <input type="text" id="event_name" placeholder="例: 夏合宿2026, 打ち上げBBQ">
  </div>

  <div id="group_exist_event" class="form-group hidden">
    <label for="select_event">既存のイベントを選択</label>
    <select id="select_event">
      <option value="">-- イベントを選んでください --</option>
    </select>
  </div>

  <div class="form-group">
    <label for="amount">支払った総額 (円)</label>
    <input type="number" id="amount" inputmode="numeric" pattern="[0-9]*" placeholder="金額を数字で入力">
  </div>

  <div class="form-group">
    <label for="request_start">請求受付開始（自動通知日時）</label>
    <input type="datetime-local" id="request_start">
  </div>

  <div class="form-group">
    <label for="deadline">請求の締め切り期日</label>
    <input type="datetime-local" id="deadline">
  </div>

  <div class="form-group">
    <label>希望する回収・受取方法</label>
    <select id="pay_method_main" onchange="toggleBankInput()">
      <option value="PayPay">PayPay（デフォルト）</option>
      <option value="現金手渡し">現金手渡し</option>
      <option value="銀行振込">銀行振込</option>
    </select>
    
    <div id="group_bank_info" class="bank-box hidden">
      <div class="bank-row">
        <input type="text" id="bank_name" placeholder="銀行名" style="flex: 1.2;">
        <input type="text" id="bank_branch" placeholder="支店名" style="flex: 1;">
      </div>
      <div class="bank-row">
        <select id="bank_type" style="flex: 0.8;">
          <option value="普通">普通</option>
          <option value="当座">当座</option>
        </select>
        <input type="number" id="bank_account" inputmode="numeric" pattern="[0-9]*" placeholder="口座番号" style="flex: 1.5;">
      </div>
    </div>
  </div>

  <button class="btn-submit" onclick="submitForm()">🚀 メンバーを選んで申請する</button>
</div>

<div id="success_page" class="success-container hidden">
  <div class="success-icon">✓</div>
  <div class="success-title">申請を確定しました！</div>
  <div class="success-text">LINEで選択したメンバーへ<br>招待状メッセージを送信しました。</div>
  
  <table class="info-table">
    <tr><td class="label-td">イベント</td><td id="res_event">-</td></tr>
    <tr><td class="label-td">総支払額</td><td id="res_amount">-</td></tr>
    <tr><td class="label-td">受付期間</td><td id="res_period">-</td></tr>
  </table>

  <button class="btn-calendar-trigger" onclick="openCalendarModal()">📅 カレンダーに追加する</button>
</div>

<div id="calendar_modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-title">お使いのカレンダーを選択</div>
    <a id="modal_gcal" href="#" target="_blank" class="modal-btn btn-google" onclick="closeCalendarModal()">Google カレンダー</a>
    <button id="modal_ical" class="modal-btn btn-apple" onclick="downloadIcsFile()">iPhone / 標準カレンダー</button>
    <button class="modal-btn btn-close" onclick="closeCalendarModal()">キャンセル</button>
  </div>
</div>

<script>
  const LIFF_ID = "2010226382-7KYbDoOC"; 
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz3NF7dnj_aC1Js7ZuYMT66OEPCVPfTzM68-2b-eB4DBI_s0CV5TnmNw3ndukzG_nHr/exec"; 

  let activeEvents = [];
  let currentUserName = "申請者";
  let gEventData = {}; // カレンダー生成用の一時記憶データ

  window.onload = function() {
    liff.init({ liffId: LIFF_ID }).then(() => {
      if (!liff.isLoggedIn()) { liff.login(); } else { fetchInitialData(); }
    }).catch(err => console.error(err));
  };

  function fetchInitialData() {
    liff.getProfile().then(prof => { currentUserName = prof.displayName; });
    fetch(`${GAS_WEB_APP_URL}?action=getInitialData`)
      .then(res => res.json())
      .then(data => {
        activeEvents = data.activeEvents || [];
        const select = document.getElementById("select_event");
        activeEvents.forEach(e => {
          const opt = document.createElement("option");
          opt.value = e.txId; opt.innerText = e.eventName; select.appendChild(opt);
        });
        document.getElementById("skeleton").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
      }).catch(err => alert("初期同期に失敗しました。"));
  }

  function toggleEventMode() {
    const isNew = document.getElementById("type_new").checked;
    document.getElementById("group_new_event").classList.toggle("hidden", !isNew);
    document.getElementById("group_exist_event").classList.toggle("hidden", isNew);
  }

  function toggleBankInput() {
    const isBank = document.getElementById("pay_method_main").value === "銀行振込";
    document.getElementById("group_bank_info").classList.toggle("hidden", !isBank);
  }

  function formatDateTime(val) {
    if (!val) return "";
    const d = new Date(val);
    return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  // 📅 時差バグを完全に修正したGoogleカレンダーURL生成（末尾のZを排除）
  function generateGoogleCalendarUrl(title, startRaw, endRaw) {
    const sStr = startRaw.replace(/[-:]/g, '').replace('T', 'T') + '00';
    const eStr = endRaw.replace(/[-:]/g, '').replace('T', 'T') + '00';
    return `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${sStr}/${eStr}&details=${encodeURIComponent('精算の締め切り期日です。LINEアプリからご対応をお願いします。')}`;
  }

  // 📱 iPhone/端末標準用の .ics ファイルを生成して自動的に開く関数
  function downloadIcsFile() {
    const sStr = gEventData.startRaw.replace(/[-:]/g, '') + '00';
    const eStr = gEventData.endRaw.replace(/[-:]/g, '') + '00';
    
    const icsContent = [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//WarikanApp//NONSGML v1.0//EN",
      "BEGIN:VEVENT",
      `SUMMARY:${gEventData.title}`,
      `DTSTART;TZID=Asia/Tokyo:${sStr}`,
      `DTEND;TZID=Asia/Tokyo:${eStr}`,
      `DESCRIPTION:精算締め切り期日です。LINEアプリから対応をお願いします。`,
      "END:VEVENT",
      "END:VCALENDAR"
    ].join("\n");

    const blob = new Blob([icsContent], { type: "text/calendar;charset=utf-8;" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "event_deadline.ics";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    closeCalendarModal();
  }

  function openCalendarModal() { document.getElementById("calendar_modal").classList.remove("hidden"); }
  function closeCalendarModal() { document.getElementById("calendar_modal").classList.add("hidden"); }

  function submitForm() {
    const mode = document.querySelector('input[name="event_type"]:checked').value;
    let eventName = mode === "新規" ? document.getElementById("event_name").value.trim() : document.getElementById("select_event").options[document.getElementById("select_event").selectedIndex].text;
    const amount = document.getElementById("amount").value;
    const reqStartRaw = document.getElementById("request_start").value;
    const deadlineRaw = document.getElementById("deadline").value;

    if (!eventName || !amount || !reqStartRaw || !deadlineRaw) { alert("未入力の項目があります。"); return; }

    // 🌟 1. ターゲットピッカーの起動
    liff.shareTargetPicker([
      {
        type: "flex",
        altText: `【招待】${eventName}の精算グループ`,
        contents: {
          type: "bubble",
          body: {
            type: "box",
            layout: "vertical",
            contents: [
              { type: "text", text: "📢 精算グループへの招待", weight: "bold", size: "lg", color: "#06C755" },
              { type: "text", text: `イベント: ${eventName}`, size: "md", margin: "md", weight: "bold" },
              { type: "text", text: `申請者: ${currentUserName}`, size: "sm", color: "#666666" },
              { type: "text", text: "この割り勘イベントに参加しますか？", size: "sm", margin: "lg", wrap: true }
            ]
          },
          footer: {
            type: "box",
            layout: "horizontal",
            spacing: "sm",
            contents: [
              { type: "button", style: "primary", color: "#06C755", action: { type: "uri", label: "⭕ はい (参加)", uri: `https://liff.line.me/${LIFF_ID}?action=join&name=${encodeURIComponent(currentUserName)}` } },
              { type: "button", style: "secondary", action: { type: "uri", label: "❌ いいえ", uri: `https://liff.line.me/${LIFF_ID}?status=no` } }
            ]
          }
        }
      }
    ]).then((res) => {
      if (res) {
        // 🌟 2. 【最重要】メッセージ送信成功と同時に裏側でGAS（DB）にデータをぶん投げて仮登録する
        const postData = {
          action: "createNewEvent",
          eventName: eventName,
          amount: amount,
          requestStart: formatDateTime(reqStartRaw),
          deadline: formatDateTime(deadlineRaw),
          creator: currentUserName
        };

        fetch(GAS_WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify(postData)
        })
        .then(response => response.json())
        .then(dbResult => {
          console.log("DB書き込み成功:", dbResult);
        })
        .catch(err => console.error("DB連携エラー:", err));

        // 🌟 3. 画面をホットペッパー風の完了画面に切り替え
        document.getElementById("res_event").innerText = eventName;
        document.getElementById("res_amount").innerText = Number(amount).toLocaleString() + "円";
        document.getElementById("res_period").innerText = `${formatDateTime(reqStartRaw)} 〜 ${formatDateTime(deadlineRaw)}`;
        
        // カレンダー用データの一時退避
        gEventData = { title: `【精算期日】${eventName}`, startRaw: reqStartRaw, endRaw: deadlineRaw };
        document.getElementById("modal_gcal").href = generateGoogleCalendarUrl(gEventData.title, gEventData.startRaw, gEventData.endRaw);

        document.getElementById("app").classList.add("hidden");
        document.getElementById("success_page").classList.remove("hidden");
      }
    }).catch(err => alert("送信がキャンセルされました"));
  }
</script>
</body>
</html>
