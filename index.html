<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出費の精算申請</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f9; margin: 0; padding: 0; color: #333; min-height: 100vh; display: flex; flex-direction: column; }
    .card { background: white; padding: 24px 20px; box-sizing: border-box; flex: 1; display: flex; flex-direction: column; justify-content: flex-start; }
    h2 { margin-top: 0; font-size: 20px; color: #111; border-left: 5px solid #06C755; padding-left: 10px; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #444; }
    input[type="text"], input[type="number"], input[type="datetime-local"], select {
      width: 100%; padding: 13px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: #fafafa; transition: border 0.2s;
    }
    input:focus, select:focus { border-color: #06C755; outline: none; background-color: #fff; }
    .radio-group { display: flex; gap: 12px; margin-bottom: 24px; }
    .radio-label { display: flex; align-items: center; gap: 6px; background: #f0f0f0; padding: 12px; border-radius: 8px; cursor: pointer; flex: 1; justify-content: center; font-weight: bold; font-size: 15px; color: #555; transition: all 0.2s; }
    input[type="radio"]:checked + .radio-label { background: #06C755; color: white; box-shadow: 0 3px 6px rgba(6,199,85,0.3); }
    input[type="radio"] { display: none; }
    .checkbox-container { border: 1px solid #e0e0e0; border-radius: 8px; max-height: 200px; overflow-y: auto; padding: 6px 12px; background: #fafafa; }
    .check-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 16px; }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: #06C755; }
    .btn-submit { background-color: #06C755; color: white; border: none; width: 100%; padding: 16px; border-radius: 10px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: auto; margin-bottom: 10px; box-shadow: 0 4px 12px rgba(6,199,85,0.3); transition: background 0.2s; }
    .btn-submit:active { background-color: #05a647; }
    
    /* 🌟 プロ風スケルトンローディング表示 */
    .skeleton-screen { padding: 20px; background: white; min-height: 100vh; box-sizing: border-box; }
    .skeleton-line { height: 20px; background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; margin-bottom: 15px; border-radius: 4px; }
    .skeleton-title { height: 30px; width: 60%; margin-bottom: 30px; }
    .skeleton-btn { height: 50px; margin-top: 50px; border-radius: 10px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    
    .hidden { display: none !important; }
    .bank-box { margin-top: 12px; padding: 14px; background: #eef3fc; border-radius: 8px; border-left: 4px solid #007aff; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div id="skeleton" class="skeleton-screen">
  <div class="skeleton-line skeleton-title"></div>
  <div class="skeleton-line" style="width: 100%; height: 45px; border-radius: 8px; margin-bottom: 25px;"></div>
  <div class="skeleton-line" style="width: 40%;"></div>
  <div class="skeleton-line" style="height: 45px; border-radius: 8px; margin-bottom: 25px;"></div>
  <div class="skeleton-line" style="width: 50%;"></div>
  <div class="skeleton-line" style="height: 120px; border-radius: 8px;"></div>
  <div class="skeleton-line skeleton-btn"></div>
</div>

<div id="app" class="card hidden">
  <h2>出費の精算申請</h2>
  
  <div class="radio-group">
    <input type="radio" id="type_new" name="event_type" value="新規" checked onchange="toggleEventMode()">
    <label for="type_new" class="radio-label">🆕 新規イベント</label>
    
    <input type="radio" id="type_exist" name="event_type" value="既存" onchange="toggleEventMode()">
    <label for="type_exist" class="radio-label">📂 既存に追加</label>
  </div>

  <div id="group_new_event" class="form-group">
    <label for="event_name">イベント名</label>
    <input type="text" id="event_name" placeholder="例: 夏合宿2026, 打ち上げBBQ">
  </div>

  <div id="group_exist_event" class="form-group hidden">
    <label for="select_event">既存のイベントを選択</label>
    <select id="select_event" onchange="onExistingEventSelect()">
      <option value="">-- イベント一覧を選んでください --</option>
    </select>
  </div>

  <div class="form-group">
    <label for="amount">支払った総額 (円)</label>
    <input type="number" id="amount" inputmode="numeric" pattern="[0-9]*" placeholder="金額を数字で入力">
  </div>

  <div class="form-group">
    <label for="request_start">請求受付開始（自動通知する日時）</label>
    <input type="datetime-local" id="request_start">
  </div>

  <div class="form-group">
    <label for="deadline">請求の締め切り期日</label>
    <input type="datetime-local" id="deadline">
  </div>

  <div class="form-group">
    <label>割り勘対象メンバー</label>
    <div id="member_list" class="checkbox-container">
      </div>
  </div>

  <div class="form-group">
    <label>希望する回収・受取方法（複数選択可）</label>
    <div class="checkbox-container">
      <div class="check-item">
        <input type="checkbox" name="pay_method" id="pay_paypay" value="PayPay" checked>
        <label for="pay_paypay">PayPay（デフォルト）</label>
      </div>
      <div class="check-item">
        <input type="checkbox" name="pay_method" id="pay_cash" value="現金手渡し">
        <label for="pay_cash">現金手渡し</label>
      </div>
      <div class="check-item">
        <input type="checkbox" name="pay_method" id="pay_bank" value="銀行振込" onchange="toggleBankInput()">
        <label for="pay_bank">銀行振込</label>
      </div>
    </div>
    
    <div id="group_bank_info" class="bank-box hidden">
      <label for="bank_info" style="font-size: 13px; color: #555;">📝 振込先口座情報（任意）</label>
      <input type="text" id="bank_info" placeholder="例: 〇〇銀行 △△支店 普通 1234567">
    </div>
  </div>

  <button class="btn-submit" onclick="submitForm()">🚀 申請データを送信する</button>
</div>

<script>
  const LIFF_ID = "2010226382-7KYbDoOC"; 
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz3NF7dnj_aC1Js7ZuYMT66OEPCVPfTzM68-2b-eB4DBI_s0CV5TnmNw3ndukzG_nHr/exec"; 

  let masterMembers = [];
  let activeEvents = [];

  window.onload = function() {
    liff.init({ liffId: LIFF_ID }).then(() => {
      if (!liff.isLoggedIn()) {
        liff.login();
      } else {
        fetchInitialData();
      }
    }).catch(err => console.error("LIFF初期化失敗", err));
  };

  function fetchInitialData() {
    if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL.includes("〜〜")) {
      alert("HTMLコード内の『GAS_WEB_APP_URL』が未設定です。貼り付けてください。");
      return;
    }
    fetch(`${GAS_WEB_APP_URL}?action=getInitialData`)
      .then(response => response.json())
      .then(data => {
        masterMembers = data.memberList;
        activeEvents = data.activeEvents;
        renderMembers();
        renderEventDropdown();
        document.getElementById("skeleton").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
      })
      .catch(err => {
        console.error("データ取得失敗", err);
        alert("データの同期に失敗しました。");
      });
  }

  function renderMembers() {
    const container = document.getElementById("member_list");
    container.innerHTML = "";
    if(masterMembers.length === 0) {
      container.innerHTML = "<div style='text-align:center;color:#888;padding:10px;font-size:14px;'>表示対象のメンバーがいません。<br>スプレッドシートの「ユーザー一覧」のG列に『ON』と入力してください。</div>";
      return;
    }
    masterMembers.forEach(m => {
      container.innerHTML += `
        <div class="check-item">
          <input type="checkbox" id="mem_${m.userId || m.displayName}" value="${m.displayName}" class="member-checkbox">
          <label for="mem_${m.userId || m.displayName}">${m.displayName}</label>
        </div>
      `;
    });
  }

  function renderEventDropdown() {
    const select = document.getElementById("select_event");
    activeEvents.forEach(e => {
      const opt = document.createElement("option");
      opt.value = e.txId;
      opt.innerText = e.eventName;
      select.appendChild(opt);
    });
  }

  function toggleEventMode() {
    const isNew = document.getElementById("type_new").checked;
    if (isNew) {
      document.getElementById("group_new_event").classList.remove("hidden");
      document.getElementById("group_exist_event").classList.add("hidden");
      document.querySelectorAll(".member-checkbox").forEach(cb => cb.checked = false);
    } else {
      document.getElementById("group_new_event").classList.add("hidden");
      document.getElementById("group_exist_event").classList.remove("hidden");
    }
  }

  function onExistingEventSelect() {
    const txId = document.getElementById("select_event").value;
    const found = activeEvents.find(e => e.txId === txId);
    if (!found) return;
    const pastMembers = found.members.split(",").map(m => m.trim());
    document.querySelectorAll(".member-checkbox").forEach(cb => {
      cb.checked = pastMembers.includes(cb.value);
    });
  }

  function toggleBankInput() {
    const isBankChecked = document.getElementById("pay_bank").checked;
    if (isBankChecked) {
      document.getElementById("group_bank_info").classList.remove("hidden");
    } else {
      document.getElementById("group_bank_info").classList.add("hidden");
    }
  }

  function formatDateTime(val) {
    if (!val) return "";
    const d = new Date(val);
    return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function submitForm() {
    const mode = document.querySelector('input[name="event_type"]:checked').value;
    let eventName = "";
    let existingTxId = "";

    if (mode === "新規") {
      eventName = document.getElementById("event_name").value.trim();
      if (!eventName) { alert("イベント名を入力してください。"); return; }
    } else {
      const select = document.getElementById("select_event");
      existingTxId = select.value;
      eventName = select.options[select.selectedIndex].text;
      if (!existingTxId) { alert("既存のイベントを選択してください。"); return; }
    }

    const amount = document.getElementById("amount").value;
    if (!amount) { alert("金額を入力してください。"); return; }

    const requestStart = formatDateTime(document.getElementById("request_start").value);
    const deadline = formatDateTime(document.getElementById("deadline").value);
    if (!requestStart || !deadline) { alert("請求受付日時と締め切り日時を両方選択してください。"); return; }

    const selectedMembers = [];
    document.querySelectorAll(".member-checkbox:checked").forEach(cb => {
      selectedMembers.push(cb.value);
    });
    if (selectedMembers.length === 0) { alert("メンバーを1人以上選択してください。"); return; }

    const selectedMethods = [];
    document.querySelectorAll('input[name="pay_method"]:checked').forEach(cb => {
      selectedMethods.push(cb.value);
    });
    if (selectedMethods.length === 0) { alert("受取方法を1つ以上選択してください。"); return; }
    
    let payMethodText = selectedMethods.join(", ");
    if (document.getElementById("pay_bank").checked) {
      const bankInfo = document.getElementById("bank_info").value.trim();
      if (bankInfo) { payMethodText += ` (${bankInfo})`; }
    }

    const textMessage = `【精算申請】\n` +
                        `区分: ${mode}\n` +
                        `既存ID: ${existingTxId}\n` +
                        `イベント: ${eventName}\n` +
                        `金額: ${amount}円\n` +
                        `請求受付: ${requestStart}\n` +
                        `請求締切: ${deadline}\n` +
                        `メンバー: ${selectedMembers.join(", ")}\n` +
                        `受取方法: ${payMethodText}`;

    liff.sendMessages([{ type: 'text', text: textMessage }]).then(() => {
      liff.closeWindow();
    }).catch(err => {
      alert("送信に失敗しました: " + err);
    });
  }
</script>
</body>
</html>
